<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><title>KisanMausam — Server Error</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F5F7F1;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.code{font-family:'Outfit',sans-serif;font-size:6rem;font-weight:800;color:#E8F5E9;line-height:1}
.title{font-family:'Outfit',sans-serif;font-size:1.6rem;font-weight:800;color:#1C2B1E;margin-bottom:10px}
.msg{color:#4A6550;font-size:.92rem;margin-bottom:28px;line-height:1.7}
.btn{display:inline-block;padding:12px 28px;background:#1B5E2F;color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:.9rem}
</style>
</head>
<body>
<div>
  <div class="code">500</div>
  <div class="title">Something went wrong</div>
  <p class="msg">We hit an unexpected error. Our team has been notified.<br>Please try again in a moment.</p>
  <a href="/" class="btn">← Back to Dashboard</a>
</div>
</body>
</html>
